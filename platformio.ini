; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:pico]
; 使用更新的社区 platform 以便支持 Philhower 核心
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200

lib_deps = 
    https://github.com/sparkfun/SparkFun_BMI270_Arduino_Library.git
    ; https://github.com/LiquidCGS/FastIMU.git ;测试MPU6050时用的，BMI270不需要这个库

build_src_filter = +<*> -<esp32/*> +<rp2040/*> -<esp8266/*>

[env:esp32]
platform = espressif32
board = esp32dev          ; 通用ESP32-WROOM-32开发板ID
framework = arduino
monitor_speed = 115200

; ESP32这边不需要IMU库，WiFi/WebServer/driver都是核心自带的
lib_deps =

; 只编译 src/esp32 目录下的代码
build_src_filter = +<*> -<rp2040/*> +<esp32/*> -<esp8266/*>

